  image_gallery_saver_plus: ^4.0.1

  #  flip_card: ^0.7.0
#  animated_border: ^0.0.1
  freezed_annotation: ^3.1.0
  vibration: ^3.1.4
  http: ^1.5.0
  flutter_dotenv: ^6.0.0
  pin_code_fields: ^8.0.1
  ionicons: ^0.2.2
  supabase: ^2.10.0
  lottie: ^3.3.2
  flutter_speed_dial: ^7.0.0
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.5
