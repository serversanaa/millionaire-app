  dotted_border: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ===== توليد الكود (Code Generation) =====
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1
  retrofit_generator: ^8.0.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

  # ===== فحص الكود (Code Analysis) =====
  flutter_lints: ^4.0.0
  very_good_analysis: ^5.1.0
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.0.0
#  screenshot: ^3.0.0              # ✅ لأخذ Screenshot
  gal: ^2.3.0
  qr_flutter: ^4.1.0
#  shimmer: ^3.0.0

# ✅ إضافة dependency_overrides لحل التعارضات
dependency_overrides:
  vector_math: ^2.2.0
  collection: ^1.18.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/translations/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
